apiVersion: nais.io/v1alpha1
kind: Application
metadata:
  name: nav-etterlevelse-mcp
  namespace: dab
  labels:
    team: dab
spec:
  port: 8080
  replicas:
    min: 1
    max: 1
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      memory: 256Mi
  liveness:
    path: /health
    initialDelay: 10
  readiness:
    path: /health
    initialDelay: 10
  ingresses:
    - https://nav-etterlevelse-mcp.intern.dev.nav.no
  env:
    - name: BASE_URL
      value: https://nav-etterlevelse-mcp.intern.dev.nav.no
    - name: LOG_LEVEL
      value: INFO
    - name: ETTERLEVELSE_SCOPE
      value: api://dev-gcp.teamdatajegerne.etterlevelse-backend/.default
    - name: BEHANDLINGSKATALOG_SCOPE
      value: api://dev-gcp.teamdatajegerne.behandlingskatalog-backend/.default
  accessPolicy:
    outbound:
      rules:
        - application: etterlevelse-backend
          namespace: teamdatajegerne
        - application: behandlingskatalog-backend
          namespace: teamdatajegerne
      external:
        - host: dab-unleash-api.nav.cloud.nais.io
  envFrom:
    - secret: nav-etterlevelse-mcp-unleash-api-token
  azure:
    application:
      enabled: true
      allowAllUsers: true
      tenant: nav.no
      replyURLs:
        - https://nav-etterlevelse-mcp.intern.dev.nav.no/oauth/callback
