apiVersion: nais.io/v1alpha1
kind: Application
metadata:
  name: nav-etterlevelse-broker
  namespace: dab
  labels:
    team: dab
spec:
  port: 8080
  replicas:
    min: 1
    max: 1
  resources:
    requests:
      cpu: 10m
      memory: 16Mi
    limits:
      memory: 32Mi
  liveness:
    path: /
    initialDelay: 5
  readiness:
    path: /
    initialDelay: 5
  azure:
    application:
      enabled: true
      allowAllUsers: true
