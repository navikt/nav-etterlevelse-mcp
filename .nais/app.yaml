apiVersion: nais.io/v1alpha1
kind: Application
metadata:
  name: nav-etterlevelse-mcp
  namespace: dab
  labels:
    team: dab
spec:
  port: 8080
  replicas:
    min: 1
    # max must stay at 1: the OAuth session store (authStore) is in-memory and
    # not shared across pods. If multiple replicas run simultaneously, a user
    # authenticated on pod A will get 401 on pod B. To support horizontal
    # scaling, replace authStore with a shared store (e.g. Redis/Valkey).
    max: 1
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      memory: 256Mi
  liveness:
    path: /health
    initialDelay: 10
  readiness:
    path: /health
    initialDelay: 10
  ingresses:
    - https://nav-etterlevelse-mcp.intern.nav.no
  env:
    - name: BASE_URL
      value: https://nav-etterlevelse-mcp.intern.nav.no
    - name: LOG_LEVEL
      value: INFO
    - name: ETTERLEVELSE_SCOPE
      value: api://prod-gcp.teamdatajegerne.etterlevelse-backend/.default offline_access
    - name: BEHANDLINGSKATALOG_SCOPE
      value: api://prod-gcp.teamdatajegerne.behandlingskatalog-backend/.default
  accessPolicy:
    outbound:
      rules:
        - application: etterlevelse-backend
          namespace: teamdatajegerne
        - application: behandlingskatalog-backend
          namespace: teamdatajegerne
  azure:
    application:
      enabled: true
      allowAllUsers: true
      replyURLs:
        - https://nav-etterlevelse-mcp.intern.nav.no/oauth/callback
